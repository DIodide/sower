name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  gitleaks:
    # skipped for dependabot PRs: their read-only GITHUB_TOKEN cannot post scan
    # results ("Resource not accessible by integration"); version bumps carry no
    # secrets, and every human push is still scanned
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The plain binary, not gitleaks-action: the action phones the GitHub
      # API for a user lookup and, when that call fails (observed during a
      # GitHub 503 incident), falls back to DEMANDING a paid license and
      # hard-fails without ever scanning. The binary has no API dependency
      # and no license check.
      - name: Run gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks git --no-banner --redact .

  deploy:
    runs-on: ubuntu-latest
    needs: [check, gitleaks]
    # gitleaks may be legitimately skipped (dependabot); check must have passed
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.check.result == 'success' &&
      (needs.gitleaks.result == 'success' || needs.gitleaks.result == 'skipped')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build image
        run: >
          docker build
          -t us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/api:${{ github.sha }}
          -f Dockerfile .

      - name: Push image
        run: docker push us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: >
          gcloud run deploy sower-api
          --image us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/api:${{ github.sha }}
          --region us-east1
          --project ${{ secrets.GCP_PROJECT_ID }}
          --quiet

      - name: Build dashboard image
        run: >
          docker build
          -t us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/dashboard:${{ github.sha }}
          -f Dockerfile.dashboard .

      - name: Push dashboard image
        run: docker push us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/dashboard:${{ github.sha }}

      - name: Deploy dashboard to Cloud Run
        # --iap re-asserts IAP on every deploy so a config drift can never
        # silently expose the dashboard
        run: >
          gcloud run deploy sower-dashboard
          --image us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/dashboard:${{ github.sha }}
          --region us-east1
          --project ${{ secrets.GCP_PROJECT_ID }}
          --iap
          --quiet

      - name: Build investigator image
        # Tier-2 screenshot-investigation Cloud Run Job. Keep the SDK's bundled
        # Claude Code binary — the Dockerfile installs without pruning optionals.
        run: >
          docker build
          -t us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/investigator:${{ github.sha }}
          -f Dockerfile.investigator .

      - name: Push investigator image
        run: docker push us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/investigator:${{ github.sha }}

      - name: Deploy investigator job to Cloud Run
        # `jobs update` (not deploy): the job resource is owned by Terraform with
        # image ignore_changes, and CI just rolls its image forward.
        run: >
          gcloud run jobs update sower-investigator
          --image us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/investigator:${{ github.sha }}
          --region us-east1
          --project ${{ secrets.GCP_PROJECT_ID }}
          --quiet

      - name: Build resume-editor image
        # Resume editor Cloud Run Job (git + tectonic + Agent SDK; no
        # optional-dep pruning — the SDK ships its binary via optional deps).
        run: >
          docker build
          -t us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/resume-editor:${{ github.sha }}
          -f Dockerfile.resume-editor .

      - name: Push resume-editor image
        run: docker push us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/resume-editor:${{ github.sha }}

      - name: Deploy resume-editor job to Cloud Run
        # Tolerate the job not existing yet: Terraform creates it on the next
        # infra apply; until then the update is a no-op skip, not a CI failure.
        run: >
          gcloud run jobs update sower-resume-editor
          --image us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/resume-editor:${{ github.sha }}
          --region us-east1
          --project ${{ secrets.GCP_PROJECT_ID }}
          --quiet
          || echo "sower-resume-editor job not created yet — skipping image roll"

      - name: Deploy compile-preview service to Cloud Run
        # Same image as the resume-editor Job; Terraform-owned env
        # (RESUME_COMPILE_SERVER=1) flips it into the HTTP compile server.
        # `services update` (never `deploy`): it must FAIL-and-skip rather
        # than create a service Terraform doesn't know about.
        run: >
          gcloud run services update sower-resume-compile
          --image us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/resume-editor:${{ github.sha }}
          --region us-east1
          --project ${{ secrets.GCP_PROJECT_ID }}
          --quiet
          || echo "sower-resume-compile service not created yet — skipping image roll"
