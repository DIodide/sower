services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: sower
      POSTGRES_DB: sower
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sower']
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:sower@postgres:5432/sower
      INGEST_API_KEY: dev-key
      QUEUE_DRIVER: inline
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
