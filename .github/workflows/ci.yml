name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  gitleaks:
    # skipped for dependabot PRs: their read-only GITHUB_TOKEN cannot post scan
    # results ("Resource not accessible by integration"); version bumps carry no
    # secrets, and every human push is still scanned
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: [check, gitleaks]
    # gitleaks may be legitimately skipped (dependabot); check must have passed
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' &&
      needs.check.result == 'success' &&
      (needs.gitleaks.result == 'success' || needs.gitleaks.result == 'skipped')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build image
        run: >
          docker build
          -t us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/api:${{ github.sha }}
          -f Dockerfile .

      - name: Push image
        run: docker push us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: >
          gcloud run deploy sower-api
          --image us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/api:${{ github.sha }}
          --region us-east1
          --project ${{ secrets.GCP_PROJECT_ID }}
          --quiet

      - name: Build dashboard image
        run: >
          docker build
          -t us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/dashboard:${{ github.sha }}
          -f Dockerfile.dashboard .

      - name: Push dashboard image
        run: docker push us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/dashboard:${{ github.sha }}

      - name: Deploy dashboard to Cloud Run
        # --iap re-asserts IAP on every deploy so a config drift can never
        # silently expose the dashboard
        run: >
          gcloud run deploy sower-dashboard
          --image us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sower/dashboard:${{ github.sha }}
          --region us-east1
          --project ${{ secrets.GCP_PROJECT_ID }}
          --iap
          --quiet
